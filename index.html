<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雅思自定义生词拼写练习器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
  <main class="home-shell">
    <header class="home-nav">
      <a class="home-brand" href="index.html" aria-label="返回首页">
        <span class="home-logo">A</span>
        <strong>IELTS Typing Learner</strong>
      </a>

      <div class="home-nav-actions">
        <button class="home-nav-btn" type="button" aria-label="个人中心">
          <span aria-hidden="true">♡</span>
          个人中心
        </button>
        <button class="home-nav-btn" type="button" aria-label="设置">
          <span aria-hidden="true">⚙</span>
          设置
        </button>
      </div>
    </header>

    <section class="home-hero">
      <h1>雅思自定义生词拼写练习器</h1>
      <p class="home-lead">简洁整理生词，创建属于自己的单词库，再用拼写练习把它们真正记住。</p>
      <p class="home-tagline"><span aria-hidden="true">▯</span> 先录入，再练习，记得更牢</p>
    </section>

    <section class="home-actions" aria-label="首页入口">
      <a class="home-main-card" href="input.html">
        <span class="home-main-icon" aria-hidden="true">＋</span>
        <h2>录入今日生词</h2>
        <p>整理今天遇到的新词，建立你的个人单词库</p>
      </a>

      <div class="home-secondary-grid">
        <a class="home-secondary-card" href="app.html">
          <span class="home-secondary-icon" aria-hidden="true">▦</span>
          <div>
            <h2>我的词库</h2>
            <p>查看和管理自己的单词库</p>
          </div>
          <strong aria-hidden="true">›</strong>
        </a>

        <a class="home-secondary-card accent-card" href="app.html">
          <span class="home-secondary-icon" aria-hidden="true">◇</span>
          <div>
            <h2>错词复习</h2>
            <p>集中复习拼写错误的单词</p>
          </div>
          <strong aria-hidden="true">›</strong>
        </a>
      </div>
    </section>

    <footer class="home-footer">
      数据保存在本地浏览器，可通过导入/导出备份。
    </footer>
  </main>
</body>
</html>
